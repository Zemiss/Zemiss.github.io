# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Opt in to Node.js 24 runtime for all JavaScript actions in this workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Keep only the newest Pages deployment run active.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v4
        with:
          retention-days: 1

  # Deployment job
  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Remove completed runs for this workflow after the newest deploy succeeds.
  cleanup:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          old_run_ids=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/workflows/jekyll.yml/runs?per_page=100" \
            --jq ".workflow_runs[] | select(.id != (${CURRENT_RUN_ID} | tonumber)) | select(.status == \"completed\") | .id")

          if [ -z "$old_run_ids" ]; then
            echo "No old workflow runs to delete."
            exit 0
          fi

          while IFS= read -r run_id; do
            echo "Deleting workflow run ${run_id}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done <<< "$old_run_ids"
