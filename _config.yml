# Site settings
title: Zemiss Blog
SEOTitle: 不周的博客 | Zemiss Blog
header-img: img/home-bg.jpg
email: zhouguigui1234@gmail.com
description: "这里是 Zemiss 的个人博客，记录数学、人工智能、生物信息学、周记和长期学习计划。"
keyword: "Zemiss, 不周的博客, 数学, 人工智能, 生物信息学, 学习记录, 周报, Jekyll Blog"
url: "https://zemiss.github.io/" # your host, for absolute URL
baseurl: "" # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: false
weibo_username: Zemiss
zhihu_username: Zemiss
github_username: Zemiss
twitter_username: xiebo412382

# Build settings
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true

# Plugins
plugins: [jekyll-paginate]

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: Zemiss

# Netease settings
netease_comment: false

# Analytics settings
# ba_track_id: [your track id]
ga_track_id: "UA-49627206-1"
ga_domain: zemiss.github.io

# Sidebar settings
sidebar: true
sidebar-about-description: "争渡，争渡！<br>Nankai University · Mathematics and Artificial Intelligence"
sidebar-avatar: https://github.com/Zemiss.png

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

